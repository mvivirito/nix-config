name: nix flake check

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: eval NixOS + home-manager (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Evaluate nixosConfigurations
        run: |
          set -euo pipefail
          for host in nixos-laptop zephyrus nixie-vm; do
            echo "::group::nixosConfigurations.$host"
            nix eval --raw ".#nixosConfigurations.$host.config.system.build.toplevel.drvPath" --show-trace
            echo
            echo "::endgroup::"
          done

      - name: Evaluate homeConfigurations
        run: |
          set -euo pipefail
          echo "::group::homeConfigurations.michael@nixos-laptop"
          nix eval --raw '.#homeConfigurations."michael@nixos-laptop".activationPackage.drvPath' --show-trace
          echo
          echo "::endgroup::"

  darwin:
    name: eval nix-darwin (aarch64-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Evaluate darwinConfigurations
        run: |
          set -euo pipefail
          for host in macbook michaelvivirito-mbp; do
            echo "::group::darwinConfigurations.$host"
            nix eval --raw ".#darwinConfigurations.$host.config.system.build.toplevel.drvPath" --show-trace
            echo
            echo "::endgroup::"
          done
